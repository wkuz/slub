<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista Prezentów · Klaudia & Wojciech</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --page-bg:     #f5ede0;
    --text:        #1a1008;
    --accent:      #8a6030;
    --accent-light:#b8924e;
    --muted:       #9e7858;
    --silk:        #6a4828;
    --border:      rgba(138,96,48,0.22);
    --card-bg:     rgba(138,96,48,0.05);
  }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--page-bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    padding: 1rem 2rem;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(245,237,224,0.93);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-logo {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: var(--accent);
    font-size: 1.2rem; letter-spacing: 0.05em;
    text-decoration: none; white-space: nowrap;
  }
  .topbar-back {
    color: var(--muted); text-decoration: none;
    font-size: 0.7rem; letter-spacing: 0.18em;
    text-transform: uppercase; transition: color 0.3s;
  }
  .topbar-back:hover { color: var(--accent); }

  /* ── PAGE CONTAINER ── */
  .page-wrap { max-width: 900px; margin: 0 auto; padding: 5rem 2rem 4rem; }

  .section-label {
    font-size: 0.7rem; letter-spacing: 0.4em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300; font-size: clamp(2rem, 5vw, 3.5rem);
    line-height: 1.1; color: var(--text); margin-bottom: 2.5rem;
  }
  .section-title em { font-style: italic; color: var(--accent-light); }

  .intro-text {
    font-size: 0.88rem; line-height: 1.8; color: var(--silk);
    max-width: 580px; margin: 0 auto 2.5rem; text-align: center;
  }

  /* ── STATS ── */
  .stats-row { display: flex; justify-content: center; align-items: center; gap: 2rem; margin-bottom: 1.5rem; }
  .stat-item { text-align: center; min-width: 70px; }
  .stat-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3rem; font-weight: 300; color: var(--accent-light); line-height: 1; display: block;
  }
  .stat-label { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-top: 0.4rem; }
  .stat-sep { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--accent); align-self: center; opacity: 0.35; }

  /* ── MY RESERVATIONS BUTTON ── */
  .reservations-btn {
    display: block; margin: 0 auto 2.5rem;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Jost', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 0.6rem 1.4rem;
    cursor: pointer; transition: all 0.3s;
  }
  .reservations-btn:hover { border-color: var(--accent); color: var(--accent); }

  .sep { width: 100%; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); }

  /* ── FILTERS ── */
  .filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.6rem; margin: 2rem 0 2.5rem; }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: 'Jost', sans-serif; font-size: 0.65rem; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 0.5rem 1.1rem; cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { color: var(--accent); border-color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: var(--page-bg); border-color: var(--accent); }

  /* ── GIFT CARDS ── */
  .gift-grid { display: flex; flex-direction: column; gap: 0.8rem; }

  .gift-card {
    padding: 1.5rem 1.8rem;
    border: 1px solid var(--border);
    background: var(--card-bg);
    display: flex; gap: 1.2rem;
    transition: border-color 0.3s, background 0.3s;
  }
  .gift-card:hover { border-color: rgba(138,96,48,0.4); background: rgba(138,96,48,0.07); }

  .gift-emoji {
    font-size: 1.8rem; width: 50px; height: 50px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border-radius: 50%;
    background: radial-gradient(circle, rgba(201,169,110,0.13) 0%, transparent 70%);
  }
  .gift-body { flex: 1; min-width: 0; }
  .gift-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem; font-weight: 300; color: var(--text); margin: 0 0 0.2rem;
  }
  .gift-desc { font-size: 0.8rem; color: var(--silk); margin: 0 0 0.8rem; line-height: 1.65; }

  .gift-meta { margin-bottom: 0.7rem; display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
  .gift-badge {
    font-size: 0.65rem; letter-spacing: 0.1em; color: var(--accent);
    background: rgba(138,96,48,0.08); padding: 0.2rem 0.7rem;
  }
  .gift-no-one { font-size: 0.72rem; color: var(--muted); font-style: italic; }
  .gift-mine {
    font-size: 0.72rem; color: var(--accent); font-style: italic;
    display: inline-block; margin-bottom: 0.5rem;
  }
  .gift-link {
    font-size: 0.72rem; color: var(--accent); text-decoration: none;
    border-bottom: 1px solid rgba(138,96,48,0.25); transition: border-color 0.3s;
    display: inline-block; margin-bottom: 0.5rem;
  }
  .gift-link:hover { border-color: var(--accent); }

  .gift-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  /* ── BUTTONS ── */
  .btn-primary {
    background: var(--accent); color: var(--page-bg); border: 1px solid var(--accent);
    font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 0.55rem 1.3rem; cursor: pointer; transition: all 0.3s;
  }
  .btn-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }
  .btn-primary:disabled { opacity: 0.45; cursor: default; }

  .btn-secondary {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 0.55rem 1.3rem; cursor: pointer; transition: all 0.3s;
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { color: #b85030; border-color: rgba(184,80,48,0.3); }
  .btn-danger:hover { border-color: #b85030; color: #b85030; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(240,230,211,0.88);
    backdrop-filter: blur(6px); z-index: 200;
    align-items: center; justify-content: center; padding: 2rem;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--page-bg); border: 1px solid rgba(138,96,48,0.3);
    padding: 2.5rem; width: 100%; max-width: 440px;
    box-shadow: 0 24px 60px rgba(138,96,48,0.12);
    position: relative;
  }
  .modal-box.wide { max-width: 480px; }

  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; font-size: 1.2rem;
    color: var(--muted); cursor: pointer; transition: color 0.3s;
  }
  .modal-close:hover { color: var(--accent); }

  .modal-emoji { font-size: 2.5rem; text-align: center; margin-bottom: 0.5rem; }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 300; color: var(--text); margin-bottom: 0.8rem;
  }
  .modal-desc { font-size: 0.82rem; color: var(--silk); margin-bottom: 1rem; line-height: 1.65; }

  .modal-input {
    width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border);
    background: rgba(138,96,48,0.04); color: var(--text);
    font-family: 'Jost', sans-serif; font-size: 0.85rem;
    outline: none; margin-bottom: 0.8rem; transition: border-color 0.3s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--muted); opacity: 0.7; }
  .modal-input.code-style {
    text-align: center; font-size: 1.6rem; letter-spacing: 0.5em;
    font-family: 'Cormorant Garamond', serif;
  }

  .modal-note { font-size: 0.7rem; color: var(--muted); font-style: italic; margin-bottom: 1.2rem; line-height: 1.6; }
  .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }

  .code-display { border-top: 1px solid var(--border); padding-top: 1rem; margin-bottom: 1rem; text-align: center; }
  .code-display-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem; }
  .code-display-value {
    font-family: 'Cormorant Garamond', serif; font-size: 2.5rem;
    font-weight: 300; color: var(--accent-light); letter-spacing: 0.3em;
  }

  .contact-card { border: 1px solid var(--border); padding: 1rem; margin-bottom: 0.7rem; background: var(--card-bg); }
  .contact-card.highlighted { background: rgba(138,96,48,0.08); border-color: rgba(138,96,48,0.35); }
  .contact-card-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.3rem; }
  .contact-card-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 300; color: var(--text); }
  .contact-card-info { font-size: 0.78rem; color: var(--muted); }

  /* ── FOOTER ── */
  .page-footer {
    text-align: center; padding: 3rem 2rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
    background: rgba(138,96,48,0.04);
  }
  .page-footer .footer-names {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 2rem; color: var(--accent-light); margin-bottom: 0.5rem;
  }
  .page-footer p { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; }

  .loading-state { text-align: center; padding: 3rem; }
  .loading-state p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; color: var(--accent-light); font-size: 1.2rem;
  }

  @media (max-width: 660px) {
    .page-wrap { padding: 4rem 1.2rem 3rem; }
    .gift-card { padding: 1.2rem; gap: 0.8rem; }
    .stats-row { gap: 1rem; }
    .stat-sep { display: none; }
    .modal-box { padding: 1.8rem; }
  }
  @media (max-width: 400px) {
    .gift-emoji { width: 40px; height: 40px; font-size: 1.4rem; }
    .gift-name { font-size: 1.15rem; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">K & W</a>
  <a href="index.html" class="topbar-back">← Powrót</a>
</div>

<!-- MAIN CONTENT -->
<div class="page-wrap">
  <p class="section-label" style="text-align:center">Prezenty</p>
  <h1 class="section-title" style="text-align:center">Nasza <em>lista życzeń</em></h1>
  <div id="registry-root">
    <div class="loading-state"><p>Ładowanie listy prezentów…</p></div>
  </div>
</div>

<!-- MODALS (reused by JS) -->
<div class="modal-overlay" id="modal-claim"></div>
<div class="modal-overlay" id="modal-success"></div>
<div class="modal-overlay" id="modal-code"></div>
<div class="modal-overlay" id="modal-reservations"></div>
<div class="modal-overlay" id="modal-cobuyers"></div>

<!-- FOOTER -->
<footer class="page-footer">
  <p class="footer-names">Klaudia &amp; Wojciech</p>
  <p>20 czerwca 2026 · Soragna, Włochy</p>
</footer>

<script>
(function() {

  // ═══════════════════════════════════════════════
  // ⚠️  CONFIGURATION — fill in your API URL:
  // ═══════════════════════════════════════════════
  const GIFTS_API_URL = 'https://script.google.com/macros/s/AKfycbw9J9CF3rjayZWLWYYSvpGAMpdxhkTwopMd8epn_3YS1_N0Bs4NZZq9XquLV78Wb7kw/exec';
  // If empty, fallback gifts below will be used (great for preview/testing).

  // ── Fallback gifts (used when API is not configured) ──
  const FALLBACK_GIFTS = [
    { id:'1', name:'Robot kuchenny KitchenAid Artisan', description:'Kultowy robot planetarny w kolorze kremowym', category:'kuchnia', image:'🍰', link:'', signupCount:0 },
    { id:'2', name:'Zestaw garnków Le Creuset', description:'Żeliwne garnki idealne na lata wspólnego gotowania', category:'kuchnia', image:'🍲', link:'', signupCount:0 },
    { id:'3', name:'Ekspres do kawy Sage Barista Pro', description:'Poranne espresso jak z najlepszej kawiarni', category:'kuchnia', image:'☕', link:'', signupCount:0 },
    { id:'4', name:'Pościel lniana – komplet', description:'Naturalna pościel z najwyższej jakości lnu', category:'dom', image:'🛏️', link:'', signupCount:0 },
    { id:'5', name:'Dywan perski do salonu', description:'Ręcznie tkany, 200×300 cm, ciepłe odcienie', category:'dom', image:'🏠', link:'', signupCount:0 },
    { id:'6', name:'Walizki podróżne Samsonite (zestaw 2 szt.)', description:'Na wspólne podróże – kabinowa i duża', category:'podróże', image:'🧳', link:'', signupCount:0 },
    { id:'7', name:'Voucher na kolację degustacyjną', description:'Restauracja z gwiazdką Michelin – wieczór dla dwojga', category:'przeżycia', image:'🍷', link:'', signupCount:0 },
    { id:'8', name:'Aparat fotograficzny Fujifilm X-T5', description:'Uwiecznianie wspólnych wspomnień w pięknej jakości', category:'inne', image:'📸', link:'', signupCount:0 },
    { id:'9', name:'Zestaw ręczników kąpielowych premium', description:'Bawełna egipska, 8 sztuk w ciepłych odcieniach', category:'dom', image:'🛁', link:'', signupCount:0 },
    { id:'10', name:'Kurs gotowania włoskiego (dla pary)', description:'Tygodniowy kurs we Włoszech – pasta, pizza i więcej', category:'przeżycia', image:'🇮🇹', link:'', signupCount:0 },
  ];

  const CATEGORIES = [
    {key:'wszystko',label:'Wszystko'}, {key:'kuchnia',label:'Kuchnia'},
    {key:'dom',label:'Dom'}, {key:'podróże',label:'Podróże'},
    {key:'przeżycia',label:'Przeżycia'}, {key:'inne',label:'Inne'}
  ];

  let gifts = [];
  let myCode = '';
  let myGiftIds = [];
  let activeCategory = 'wszystko';
  let apiAvailable = false;

  function pL(n) { return n===1?'1 osoba':n>=2&&n<=4?n+' osoby':n+' osób'; }
  function pV(n) { return n===1?'zapisana':n<5?'zapisane':'zapisanych'; }

  // ── API ──
  async function api(params) {
    if (!GIFTS_API_URL) throw new Error('No API');
    const u = new URL(GIFTS_API_URL);
    Object.keys(params).forEach(k => u.searchParams.set(k, params[k]));
    const r = await fetch(u.toString());
    return r.json();
  }

  // ── Load ──
  async function loadGifts() {
    try {
      if (!GIFTS_API_URL) throw new Error('No API configured');
      gifts = await api({ action: 'getGifts' });
      apiAvailable = true;
      if (myCode) {
        const r = await api({ action: 'myReservations', code: myCode });
        myGiftIds = r.giftIds || [];
      }
    } catch {
      gifts = FALLBACK_GIFTS;
      apiAvailable = false;
    }
    render();
  }

  // ── Render ──
  function render() {
    const fl = activeCategory === 'wszystko' ? gifts : gifts.filter(g => g.category === activeCategory);
    const tot = gifts.length;
    const cl = gifts.filter(g => (g.signupCount || 0) > 0).length;

    let h = '';

    // Intro
    h += '<p class="intro-text">Waszą obecność na naszym ślubie uważamy za najpiękniejszy prezent. Jeśli jednak chcielibyście nas dodatkowo obdarować, poniżej znajdziecie listę rzeczy, o których wspólnie marzymy. Rezerwacja jest w pełni anonimowa — nie zobaczymy, kto co wybrał. Do droższych prezentów można dołączyć we\u00a0dwoje lub w\u00a0grupie.</p>';

    // Stats
    h += '<div class="stats-row">';
    h += '<div class="stat-item"><span class="stat-number">' + tot + '</span><span class="stat-label">propozycji</span></div>';
    h += '<span class="stat-sep">·</span>';
    h += '<div class="stat-item"><span class="stat-number">' + cl + '</span><span class="stat-label">zarezerwowanych</span></div>';
    h += '<span class="stat-sep">·</span>';
    h += '<div class="stat-item"><span class="stat-number">' + (tot - cl) + '</span><span class="stat-label">wolnych</span></div>';
    h += '</div>';

    // My reservations
    if (apiAvailable) {
      h += '<button class="reservations-btn" onclick="grMyReservations()">Moje rezerwacje</button>';
    }

    h += '<div class="sep"></div>';

    // Filters
    h += '<div class="filters">';
    CATEGORIES.forEach(function(c) {
      h += '<button class="filter-btn' + (c.key === activeCategory ? ' active' : '') + '" onclick="grFilter(\'' + c.key + '\')">' + c.label + '</button>';
    });
    h += '</div>';

    // Cards
    h += '<div class="gift-grid">';
    fl.forEach(function(g) {
      var n = g.signupCount || 0;
      var mine = myGiftIds.indexOf(g.id) >= 0;

      h += '<div class="gift-card">';
      h += '<div class="gift-emoji">' + g.image + '</div>';
      h += '<div class="gift-body">';
      h += '<h3 class="gift-name">' + g.name + '</h3>';
      h += '<p class="gift-desc">' + g.description + '</p>';

      h += '<div class="gift-meta">';
      if (n > 0) {
        h += '<span class="gift-badge">' + pL(n) + ' ' + pV(n) + '</span>';
      } else {
        h += '<span class="gift-no-one">Nikt jeszcze się nie zapisał</span>';
      }
      h += '</div>';

      if (g.link) {
        h += '<a href="' + g.link + '" target="_blank" rel="noopener noreferrer" class="gift-link">Zobacz produkt ↗</a>';
      }

      if (mine) {
        h += '<div class="gift-mine">Jesteś zapisany/a ✓</div>';
      }

      h += '<div class="gift-actions">';
      if (!mine && apiAvailable) {
        h += '<button class="btn-primary" onclick="grOpenClaim(\'' + g.id + '\')">' + (n > 0 ? 'Dołącz' : 'Rezerwuję') + '</button>';
      }
      if (mine && n > 1) {
        h += '<button class="btn-secondary" style="font-size:.62rem;padding:.4rem .9rem" onclick="grShowCobuyers(\'' + g.id + '\')">Współkupujący (' + (n - 1) + ')</button>';
      }
      h += '</div>';

      h += '</div></div>';
    });
    h += '</div>';

    document.getElementById('registry-root').innerHTML = h;
  }

  // ── Filter ──
  window.grFilter = function(cat) { activeCategory = cat; render(); };

  // ── Helper: open/close modal ──
  function openModal(id, html) {
    var el = document.getElementById(id);
    el.innerHTML = '<div class="modal-box" onclick="event.stopPropagation()">' + html + '</div>';
    el.classList.add('open');
    el.onclick = function(e) { if (e.target === el) closeModal(id); };
  }
  function closeModal(id) { var el = document.getElementById(id); el.classList.remove('open'); el.innerHTML = ''; }
  window.grCloseAll = function() {
    ['modal-claim','modal-success','modal-code','modal-reservations','modal-cobuyers'].forEach(function(id) { closeModal(id); });
  };
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') grCloseAll(); });

  // ══════════════════════════
  //  CLAIM FLOW
  // ══════════════════════════
  window.grOpenClaim = function(giftId) {
    var g = gifts.filter(function(x) { return x.id === giftId; })[0];
    if (!g) return;
    var n = g.signupCount || 0;

    var h = '<div style="text-align:center">';
    h += '<div class="modal-emoji">' + g.image + '</div>';
    h += '<h3 class="modal-title">' + g.name + '</h3>';
    h += '<p class="modal-desc">' + g.description + '</p>';
    if (n > 0) {
      h += '<p style="font-size:.72rem;color:var(--accent);font-style:italic;margin:0 0 1rem">';
      h += 'Aktualnie ' + pL(n) + ' ' + (n===1?'jest zapisana':n<5?'są zapisane':'jest zapisanych') + '</p>';
    }
    h += '<input class="modal-input" id="claim-name" placeholder="Imię i nazwisko">';
    h += '<input class="modal-input" id="claim-contact" placeholder="E-mail lub telefon (do koordynacji zakupu)">';
    h += '<p class="modal-note">Dane kontaktowe będą widoczne wyłącznie dla innych osób zapisanych na ten sam prezent — w celu koordynacji zakupu. Para Młoda ich nie zobaczy.</p>';
    h += '<div class="modal-actions">';
    h += '<button class="btn-secondary" onclick="closeModal(\'modal-claim\')">Anuluj</button>';
    h += '<button class="btn-primary" id="claim-submit" onclick="grSubmitClaim(\'' + giftId + '\')">Potwierdzam</button>';
    h += '</div></div>';

    openModal('modal-claim', h);
    setTimeout(function() { var el = document.getElementById('claim-name'); if (el) el.focus(); }, 100);
  };

  window.grSubmitClaim = async function(giftId) {
    var name = (document.getElementById('claim-name').value || '').trim();
    var contact = (document.getElementById('claim-contact').value || '').trim();
    if (!name || !contact) return;

    var btn = document.getElementById('claim-submit');
    btn.disabled = true; btn.textContent = 'Zapisuję…';

    var code = myCode || String(Math.floor(1000 + Math.random() * 9000));

    try {
      var res = await api({ action: 'signup', giftId: giftId, name: name, contact: contact, code: code });
      if (res.error) { alert(res.error); btn.disabled = false; btn.textContent = 'Potwierdzam'; return; }
      if (!myCode) myCode = code;
      closeModal('modal-claim');
      grShowSuccess(code, giftId);
      await loadGifts();
    } catch (err) {
      alert('Wystąpił błąd. Spróbuj ponownie.');
      btn.disabled = false; btn.textContent = 'Potwierdzam';
    }
  };

  function grShowSuccess(code, giftId) {
    var g = gifts.filter(function(x) { return x.id === giftId; })[0];
    var h = '<div style="text-align:center">';
    h += '<div class="modal-emoji">🎉</div>';
    h += '<h3 class="modal-title">Zapisano!</h3>';
    h += '<p class="modal-desc">Twoja rezerwacja na <strong>' + (g ? g.name : '') + '</strong> została zapisana.</p>';
    h += '<div class="code-display"><p class="code-display-label">Twój kod rezerwacji</p>';
    h += '<p class="code-display-value">' + code + '</p></div>';
    h += '<p class="modal-note">Zachowaj ten kod! Pozwoli Ci przeglądać rezerwacje, kontaktować się ze współkupującymi i anulować rezerwację.</p>';
    h += '<button class="btn-primary" onclick="closeModal(\'modal-success\')">Rozumiem</button>';
    h += '</div>';
    openModal('modal-success', h);
  }

  // ══════════════════════════
  //  MY RESERVATIONS
  // ══════════════════════════
  window.grMyReservations = function() {
    if (myCode) { grShowMyList(); } else { grShowCodeEntry(); }
  };

  function grShowCodeEntry() {
    var h = '<div style="text-align:center">';
    h += '<h3 class="modal-title">Wpisz swój kod</h3>';
    h += '<p class="modal-desc">Podaj 4-cyfrowy kod, który otrzymałeś/aś przy rezerwacji.</p>';
    h += '<input class="modal-input code-style" id="code-input" placeholder="····" maxlength="4">';
    h += '<div class="modal-actions">';
    h += '<button class="btn-secondary" onclick="closeModal(\'modal-code\')">Anuluj</button>';
    h += '<button class="btn-primary" onclick="grSubmitCode()">Dalej</button>';
    h += '</div></div>';
    openModal('modal-code', h);
    setTimeout(function() {
      var el = document.getElementById('code-input');
      if (!el) return;
      el.focus();
      el.addEventListener('input', function() { this.value = this.value.replace(/\D/g, '').slice(0, 4); });
      el.addEventListener('keydown', function(e) { if (e.key === 'Enter') grSubmitCode(); });
    }, 100);
  }

  window.grSubmitCode = async function() {
    var code = (document.getElementById('code-input').value || '').trim();
    if (code.length < 4) return;
    try {
      var res = await api({ action: 'verifyCode', code: code });
      if (res.exists) {
        myCode = code;
        closeModal('modal-code');
        var r2 = await api({ action: 'myReservations', code: code });
        myGiftIds = r2.giftIds || [];
        render();
        grShowMyList();
      } else { alert('Nie znaleziono rezerwacji z tym kodem.'); }
    } catch { alert('Błąd połączenia.'); }
  };

  async function grShowMyList() {
    var res = await api({ action: 'myReservations', code: myCode });
    myGiftIds = res.giftIds || [];
    var myGifts = gifts.filter(function(g) { return myGiftIds.indexOf(g.id) >= 0; });

    var h = '<button class="modal-close" onclick="closeModal(\'modal-reservations\')">✕</button>';
    h += '<h3 class="modal-title">Moje rezerwacje</h3>';

    if (!myGifts.length) {
      h += '<p style="font-size:.82rem;color:var(--muted);font-style:italic">Nie masz jeszcze żadnych rezerwacji.</p>';
    } else {
      myGifts.forEach(function(g) {
        var others = (g.signupCount || 0) - 1;
        h += '<div class="contact-card">';
        h += '<div style="display:flex;align-items:center;gap:.7rem">';
        h += '<span style="font-size:1.4rem">' + g.image + '</span>';
        h += '<div><div class="contact-card-name" style="font-size:.95rem">' + g.name + '</div>';
        if (others > 0) h += '<div style="font-size:.72rem;color:var(--accent);margin-top:.15rem">+ ' + pL(others) + '</div>';
        h += '</div></div>';
        h += '<div style="display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap">';
        if (others > 0) {
          h += '<button class="btn-secondary" style="font-size:.6rem;padding:.3rem .7rem" onclick="closeModal(\'modal-reservations\');grShowCobuyers(\'' + g.id + '\')">Współkupujący</button>';
        }
        h += '<button class="btn-secondary btn-danger" style="font-size:.6rem;padding:.3rem .7rem" onclick="grCancelReservation(\'' + g.id + '\')">Anuluj rezerwację</button>';
        h += '</div></div>';
      });
    }
    openModal('modal-reservations', '<div class="modal-box wide" onclick="event.stopPropagation()">' + h + '</div>');
    // Fix: we wrapped in modal-box already via openModal, remove double wrap
    document.getElementById('modal-reservations').innerHTML = '';
    var el = document.getElementById('modal-reservations');
    el.innerHTML = '<div class="modal-box wide" onclick="event.stopPropagation()" style="position:relative">' + h + '</div>';
    el.classList.add('open');
    el.onclick = function(e) { if (e.target === el) closeModal('modal-reservations'); };
  }

  window.grCancelReservation = async function(giftId) {
    if (!confirm('Czy na pewno chcesz anulować tę rezerwację?')) return;
    await api({ action: 'cancel', giftId: giftId, code: myCode });
    closeModal('modal-reservations');
    await loadGifts();
  };

  // ══════════════════════════
  //  CO-BUYERS
  // ══════════════════════════
  window.grShowCobuyers = async function(giftId) {
    var g = gifts.filter(function(x) { return x.id === giftId; })[0];
    if (!g || !myCode) return;
    var res = await api({ action: 'coContributors', giftId: giftId, code: myCode });
    if (res.error) { alert(res.error); return; }

    var all = res.contributors || [];
    var mine = all.filter(function(c) { return c.code === myCode; })[0];
    var others = all.filter(function(c) { return c.code !== myCode; });

    var h = '<button class="modal-close" onclick="closeModal(\'modal-cobuyers\')">✕</button>';
    h += '<h3 class="modal-title">Współkupujący</h3>';
    h += '<p class="modal-desc">Dane kontaktowe osób zapisanych na <strong>' + g.name + '</strong>. Ustalcie między sobą, kto kupi prezent.</p>';

    if (mine) {
      h += '<div class="contact-card highlighted"><div class="contact-card-label">Ty</div>';
      h += '<div class="contact-card-name">' + mine.name + '</div>';
      h += '<div class="contact-card-info">' + mine.contact + '</div></div>';
    }
    if (others.length) {
      others.forEach(function(c) {
        h += '<div class="contact-card"><div class="contact-card-name">' + c.name + '</div>';
        h += '<div class="contact-card-info">' + c.contact + '</div></div>';
      });
    } else {
      h += '<p style="font-size:.78rem;color:var(--accent);font-style:italic">Na razie tylko Ty jesteś zapisany/a.</p>';
    }

    var el = document.getElementById('modal-cobuyers');
    el.innerHTML = '<div class="modal-box wide" onclick="event.stopPropagation()" style="position:relative">' + h + '</div>';
    el.classList.add('open');
    el.onclick = function(e) { if (e.target === el) closeModal('modal-cobuyers'); };
  };

  // ── Init ──
  loadGifts();

})();
</script>
</body>
</html>
